<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise for Aditya</title>
    <style>
        :root {
            --gold: #f1c40f;
            --deep-blue: #0f2027;
            --gate-brown: #3d1c02;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            perspective: 1200px;
        }

        /* The Grand Gate */
        .gate-wrapper {
            position: relative;
            width: 400px;
            height: 500px;
            transform-style: preserve-3d;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border: 8px solid #221101;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
        }

        .door {
            position: absolute;
            width: 50%;
            height: 100%;
            background: var(--gate-brown);
            background-image: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,0,0,0.2) 41px);
            border: 2px solid #221101;
            transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5;
            display: flex;
            align-items: center;
        }

        .door-left {
            left: 0;
            transform-origin: left;
            justify-content: flex-end;
            padding-right: 10px;
        }

        .door-right {
            right: 0;
            transform-origin: right;
            justify-content: flex-start;
            padding-left: 10px;
        }

        /* Gold Handles */
        .handle {
            width: 15px;
            height: 60px;
            background: linear-gradient(to right, #d4af37, #f1c40f, #d4af37);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        /* Open State */
        .open .door-left { transform: rotateY(-140deg); }
        .open .door-right { transform: rotateY(140deg); }

        /* Surprise Content */
        .content {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: center;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle, #2c3e50, #000);
            z-index: 1;
            color: white;
        }

        .message-box {
            padding: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.8);
        }

        .from-text {
            font-size: 1.5rem;
            font-style: italic;
            color: #ecf0f1;
            margin-top: 20px;
        }

        /* Button to Start */
        #startBtn {
            position: absolute;
            z-index: 100;
            padding: 20px 40px;
            font-size: 1.5rem;
            background: var(--gold);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }

        #startBtn:hover { transform: scale(1.1); }

        /* Confetti Canvas */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <button id="startBtn">Click to Open Surprise 🎁</button>

    <div class="gate-wrapper" id="mainGate">
        <div class="door door-left"><div class="handle"></div></div>
        <div class="door door-right"><div class="handle"></div></div>
        
        <div class="content">
            <div class="message-box">
                <h1>✨ Happy Birthday Aditya! ✨</h1>
                <p class="from-text">Best wishes from <b>Avikam</b></p>
                <div style="font-size: 50px;">🎂🎈🎉</div>
            </div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const startBtn = document.getElementById('startBtn');
        const mainGate = document.getElementById('mainGate');

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            mainGate.classList.add('open');
            
            // Voice Message
            const msg = new SpeechSynthesisUtterance();
            msg.text = "Happy Birthday Aditya! Best wishes to you from Avikam. Have a fantastic day!";
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);

            // Start Confetti
            initConfetti();
        });

        // Simple Confetti Effect
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];

        function initConfetti() {
            for(let i=0; i<150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 10 + 5,
                    color: `hsl(${Math.random() * 360}, 70%, 60%)`,
                    vel: Math.random() * 3 + 2
                });
            }
            animate();
        }

        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y += p.vel;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                if(p.y > canvas.height) p.y = -20;
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
